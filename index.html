<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Market Dashboard</title>

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Market Dash">
  <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/m-friz/market-dashboard/main/icon.png">

  <style>
    :root{--bg:#1a2640;--surf:#223050;--surf2:#2a3a60;--border:#354870;--accent:#3b82f6;--cyan:#06b6d4;--green:#10b981;--red:#ef4444;--amber:#f59e0b;--text:#e2e8f0;--muted:#64748b;--mono:'JetBrains Mono','Fira Mono',monospace;--sans:'Inter',system-ui,sans-serif}
    /* Light themes */
    body.light   {--bg:#f0f4f8;--surf:#ffffff;--surf2:#e8edf5;--border:#cbd5e1;--text:#1e293b;--muted:#64748b;--accent:#2563eb;--cyan:#0891b2;--green:#059669;--red:#dc2626;--amber:#d97706}
    body.pearl   {--bg:#f8f6f2;--surf:#ffffff;--surf2:#f0ede7;--border:#ddd8cf;--text:#2d2a26;--muted:#78716c;--accent:#7c3aed;--cyan:#0891b2;--green:#059669;--red:#dc2626;--amber:#d97706}
    body.sky     {--bg:#e8f4fd;--surf:#ffffff;--surf2:#d6ebf8;--border:#bdd7ee;--text:#0f2942;--muted:#5b7fa6;--accent:#0369a1;--cyan:#0284c7;--green:#059669;--red:#dc2626;--amber:#d97706}
    body.mint    {--bg:#ecfdf5;--surf:#ffffff;--surf2:#d1fae5;--border:#a7f3d0;--text:#064e3b;--muted:#6b7280;--accent:#059669;--cyan:#0891b2;--green:#047857;--red:#dc2626;--amber:#d97706}
    body.rose    {--bg:#fff1f2;--surf:#ffffff;--surf2:#ffe4e6;--border:#fecdd3;--text:#4c0519;--muted:#9f8a8d;--accent:#e11d48;--cyan:#0891b2;--green:#059669;--red:#be123c;--amber:#d97706}
    /* Dark themes */
    body.navy    {--bg:#0d1b2a;--surf:#1a2d42;--surf2:#1f3652;--border:#2a4a6b;--text:#e2e8f0;--muted:#64748b;--accent:#38bdf8;--cyan:#22d3ee;--green:#34d399;--red:#f87171;--amber:#fbbf24}
    body.slate   {--bg:#1e1e2e;--surf:#2a2a3e;--surf2:#32324a;--border:#44445a;--text:#cdd6f4;--muted:#6c7086;--accent:#89b4fa;--cyan:#89dceb;--green:#a6e3a1;--red:#f38ba8;--amber:#fab387}
    body.forest  {--bg:#0d1f13;--surf:#132a1a;--surf2:#1a3522;--border:#234d2d;--text:#d1fae5;--muted:#6b7280;--accent:#34d399;--cyan:#6ee7b7;--green:#10b981;--red:#ef4444;--amber:#f59e0b}
    body.midnight{--bg:#09090b;--surf:#18181b;--surf2:#27272a;--border:#3f3f46;--text:#fafafa;--muted:#71717a;--accent:#a78bfa;--cyan:#67e8f9;--green:#4ade80;--red:#f87171;--amber:#fbbf24}
    body.ocean   {--bg:#0c1926;--surf:#0f2a3d;--surf2:#143550;--border:#1e4d70;--text:#e0f2fe;--muted:#5b8ba8;--accent:#06b6d4;--cyan:#22d3ee;--green:#34d399;--red:#f87171;--amber:#fbbf24}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px}
    header{background:var(--surf);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;position:sticky;top:0;z-index:100}
    .logo{display:flex;align-items:center;gap:10px}
    .logo-mark{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--cyan));border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:#fff}
    .logo-text{font-size:15px;font-weight:700}
    .header-right{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
    #last-updated{font-size:11px;color:var(--muted);font-family:var(--mono)}
    .btn{background:var(--accent);color:#fff;border:none;padding:8px 16px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;transition:opacity .15s}
    .btn:hover{opacity:.85}
    .btn-spin{animation:spin 1s linear infinite;display:inline-block}
    @keyframes spin{to{transform:rotate(360deg)}}
    .tabs{display:flex;border-bottom:1px solid var(--border);padding:0 24px;background:var(--surf);overflow-x:auto;position:sticky;top:57px;z-index:99}
    .tab{padding:11px 18px;cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);border-bottom:2px solid transparent;transition:color .15s,border-color .15s;margin-bottom:-1px;white-space:nowrap}
    .tab:hover{color:var(--text)}.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
    main{padding:18px 24px;max-width:1500px;margin:0 auto}
    .tab-panel{display:none}.tab-panel.active; {display:block}
    .state-box{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 24px;gap:16px;text-align:center}
    .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
    .state-box p{color:var(--muted);font-size:14px}
    .err-txt{color:var(--red);font-family:var(--mono);font-size:12px;max-width:600px}
    #warning-banner{display:none;background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);border-radius:8px;padding:10px 16px;margin-bottom:16px}
    .warn-item{font-size:12px;color:var(--amber);line-height:1.7}
    .spy-bar{background:var(--surf);border:1px solid var(--border);border-radius:10px;padding:12px 20px;margin-bottom:16px;display:flex;align-items:center;gap:20px;flex-wrap:wrap}
    .spy-lbl{font-size:10px;letter-spacing:.8px;text-transform:uppercase;color:var(--muted)}
    .spy-val{font-family:var(--mono);font-size:13px;font-weight:700}
    .spy-div{width:1px;height:22px;background:var(--border)}
    .summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:16px}
    .card{background:var(--surf);border:1px solid var(--border);border-radius:10px;padding:12px 14px}
    .card .lbl{font-size:10px;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
    .card .val{font-size:16px;font-weight:700;font-family:var(--mono)}
    .card .sub{font-size:11px;color:var(--muted);margin-top:2px}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
    @media(max-width:900px){.grid2{grid-template-columns:1fr}}
    .panel{background:var(--surf);border:1px solid var(--border);border-radius:10px;padding:18px 20px}
    .panel h3{font-size:13px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}
    .panel h3 .sub{font-size:10px;letter-spacing:.8px;text-transform:uppercase;color:var(--muted)}
    .bar-chart{display:flex;flex-direction:column;gap:5px}
    .bar-row{display:grid;grid-template-columns:18px 54px 1fr;align-items:center;gap:8px;border-radius:5px;padding:2px 4px;cursor:default;transition:background .15s;position:relative}
    .bar-row:hover{background:var(--surf2)}
    .bar-rank{font-size:10px;color:var(--text);text-align:center;font-family:var(--mono);font-weight:600}
    .bar-ticker{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--text);text-align:right}
    .bar-track{background:var(--border);border-radius:4px;height:22px;position:relative}
    .bar-fill{height:100%;border-radius:4px;transition:width .7s cubic-bezier(.16,1,.3,1);position:relative;min-width:2px}
    .bar-lbl{position:absolute;right:6px;top:50%;transform:translateY(-50%);font-family:var(--mono);font-size:10px;font-weight:800;color:rgba(255,255,255,.9);white-space:nowrap;pointer-events:none}
    .pos{background:var(--green);color:var(--green)}.neg{background:var(--red);color:var(--red)}
    .bar-sep{height:1px;background:var(--border);margin:3px 0;grid-column:1/-1}
    .bar-tooltip{display:none;position:absolute;left:80px;top:-60px;background:#0d1929;border:1px solid var(--border);border-radius:8px;padding:10px 14px;z-index:999;white-space:nowrap;box-shadow:0 4px 24px rgba(0,0,0,.6);pointer-events:none}
    .bar-row:hover .bar-tooltip{display:block}
    .tt-name{font-size:12px;font-weight:700;color:var(--text);margin-bottom:5px}
    .tt-row{font-size:11px;font-family:var(--mono);color:var(--muted);line-height:1.7}
    .tt-p{color:var(--cyan);font-weight:700}.tt-g{color:var(--green);font-weight:700}.tt-r{color:var(--red);font-weight:700}.tt-a{color:var(--amber);font-weight:700}
    .sig{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:800;font-family:var(--mono);letter-spacing:.5px;white-space:nowrap}
    .sig-s{background:rgba(16,185,129,.18);color:var(--green);border:1px solid rgba(16,185,129,.3)}
    .sig-n{background:rgba(245,158,11,.15);color:var(--amber);border:1px solid rgba(245,158,11,.3)}
    .sig-w{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3)}
    .rsi-badge{font-family:var(--mono);font-size:11px;font-weight:700;padding:2px 6px;border-radius:4px}
    .rsi-ob{background:rgba(239,68,68,.15);color:var(--red)}
    .rsi-os{background:rgba(16,185,129,.15);color:var(--green)}
    .rsi-mid{background:rgba(100,116,139,.15);color:var(--muted)}
    .ma-above{background:rgba(16,185,129,.12);color:var(--green);font-family:var(--mono);font-size:10px;padding:2px 6px;border-radius:4px;font-weight:700}
    .ma-below{background:rgba(239,68,68,.12);color:var(--red);font-family:var(--mono);font-size:10px;padding:2px 6px;border-radius:4px;font-weight:700}
    .earn-warn{background:rgba(245,158,11,.15);color:var(--amber);font-family:var(--mono);font-size:10px;padding:2px 6px;border-radius:4px;font-weight:700;white-space:nowrap}
    .score-wrap{display:flex;align-items:center;gap:6px}
    .score-bar{width:48px;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
    .score-fill{height:100%;border-radius:2px}
    .vol-lo{background:rgba(16,185,129,.12);color:var(--green);font-family:var(--mono);font-size:10px;padding:2px 5px;border-radius:4px}
